<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全職獵人 句子列表</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 16px; text-align: center; }
        .header a { color: #fff; text-decoration: none; font-size: 14px; opacity: 0.8; }
        .header h1 { color: #fff; font-size: 20px; margin-bottom: 8px; }
        .container { max-width: 800px; margin: 0 auto; padding: 16px; }
        .sentence-item {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-left: 4px solid #1a1a2e;
        }
        .sentence-item a { text-decoration: none; color: inherit; display: block; }
        .sentence-item:hover { transform: translateX(4px); }
        .sentence-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .sentence-id { font-size: 14px; color: #999; }
        .sentence-character { font-size: 12px; color: #1a1a2e; background: #e8e8f0; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
        .sentence-japanese { font-size: 20px; color: #333; font-weight: 500; }
        .sentence-translation { font-size: 14px; color: #666; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html">← 返回主頁</a>
        <h1>🦋 全職獵人</h1>
    </div>
    <div class="container">
        <div id="list"></div>
    </div>
    <script>
        fetch('./hunter-data.json')
            .then(r => r.json())
            .then(data => {
                const list = document.getElementById('list');
                (data.sentences || []).forEach((s, i) => {
                    let translation = '';
                    if (s.explanation && s.explanation.length > 0) {
                        const fullSent = s.explanation.find(e => e.pos === '句子');
                        translation = fullSent ? fullSent.mean : (s.explanation[0] ? s.explanation[0].mean : '');
                    }
                    if (!translation) translation = s.translation || '';
                    list.innerHTML += `
                        <div class="sentence-item">
                            <a href="hunter-detail.html?id=${i}">
                                <div class="sentence-header">
                                    <span class="sentence-id">#${s.id}</span>
                                    <span class="sentence-character">${s.character || ''}</span>
                                </div>
                                <div class="sentence-japanese">${s.japanese || ''}</div>
                                <div class="sentence-translation">${translation}</div>
                            </a>
                        </div>
                    `;
                });
            })
            .catch(err => {
                document.getElementById('list').innerHTML = '<p style="text-align:center;padding:40px;">暫無資料</p>';
            });
    </script>
</body>
</html>
