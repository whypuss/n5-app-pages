<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N2 句子列表</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
        .header { background: #fff; padding: 16px; border-bottom: 1px solid #e0e0e0; text-align: center; }
        .header a { color: #c0392b; text-decoration: none; font-size: 14px; }
        .container { max-width: 800px; margin: 0 auto; padding: 16px; }
        .sentence-item {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-left: 4px solid #c0392b;
        }
        .sentence-item a { text-decoration: none; color: inherit; display: block; }
        .sentence-item:hover { transform: translateX(4px); }
        .sentence-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .sentence-id { font-size: 14px; color: #999; }
        .sentence-category { font-size: 12px; color: #c0392b; background: #fdf2f2; padding: 2px 8px; border-radius: 4px; }
        .sentence-japanese { font-size: 20px; color: #333; font-weight: 500; }
        .loading { text-align: center; padding: 40px; color: #666; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html">← 返回主頁</a>
    </div>
    <div class="container">
        <h1 style="margin-bottom: 16px; color: #c0392b;">📕 N2 句子列表</h1>
        <div id="list"><div class="loading">載入中...</div></div>
    </div>
    <script>
        fetch('./n2-data.json?t=' + Date.now())
            .then(r => r.json())
            .then(data => {
                const list = document.getElementById('list');
                data.sentences.forEach((s, i) => {
                    const japanese = (s.sequence || []).map(p => p[0]).join('') || s.japanese || '';
                    list.innerHTML += `
                        <div class="sentence-item">
                            <a href="n2-detail.html?id=${i}">
                                <div class="sentence-header">
                                    <span class="sentence-id">#${s.id || i+1}</span>
                                    <span class="sentence-category">${s.category || ''}</span>
                                </div>
                                <div class="sentence-japanese">${japanese}</div>
                            </a>
                        </div>
                    `;
                });
            })
            .catch(err => {
                document.getElementById('list').innerHTML = '<p style="text-align:center;padding:40px;">載入失敗</p>';
            });
    </script>
</body>
</html>
