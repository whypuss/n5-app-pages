<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全職獵人 句子</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
        
        .header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 16px; text-align: center; }
        .header a { color: #fff; text-decoration: none; font-size: 14px; opacity: 0.8; }
        .header h1 { color: #fff; font-size: 18px; margin-bottom: 4px; }
        
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #fff; border-bottom: 1px solid #e0e0e0; }
        .nav-btn { padding: 10px 20px; background: #1a1a2e; color: #fff; border: none; border-radius: 20px; font-size: 14px; cursor: pointer; text-decoration: none; }
        .nav-btn:disabled { background: #ccc; cursor: not-allowed; }
        
        .sentence-card { background: #fff; border-radius: 12px; padding: 24px; margin: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 800px; margin-left: auto; margin-right: auto; margin-bottom: 100px; }
        
        .sentence-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid #1a1a2e; }
        .sentence-id { font-size: 16px; font-weight: bold; color: #333; }
        .sentence-character { font-size: 14px; color: #1a1a2e; background: #e8e8f0; padding: 4px 12px; border-radius: 4px; font-weight: 600; }
        
        .japanese-main { text-align: center; font-size: 28px; color: #333; font-weight: bold; margin-bottom: 20px; }
        
        .japanese-section { background: #fff; border: 2px solid #1a1a2e; border-radius: 8px; padding: 16px; margin-bottom: 20px; overflow-x: auto; }
        
        .vert-container { display: flex; justify-content: center; min-width: max-content; }
        .vert-col { display: flex; flex-direction: column; align-items: center; min-width: 40px; padding: 0 4px; }
        .vert-kanji { font-size: 22px; font-weight: bold; color: #333; }
        .vert-hira { font-size: 14px; color: #666; line-height: 1.4; }
        .vert-ro { font-size: 12px; color: #999; font-style: italic; line-height: 1.4; }
        
        .grammar-table { width: 100%; border-collapse: collapse; font-size: 13px; border: 2px solid #1a1a2e; }
        .grammar-table th { background: #1a1a2e; color: #fff; padding: 10px; text-align: left; }
        .grammar-table td { border: 1px solid #ddd; padding: 10px; background: #fafafa; }
        .word-col { font-weight: bold; color: #333; }
        .mean-col { color: #c0392b; }
        .pos-col { color: #666; font-size: 12px; }
        .note-col { color: #888; font-size: 12px; font-style: italic; }
        
        .translation { margin-top: 16px; padding: 16px; background: #e8e8f0; border-radius: 8px; text-align: center; border-left: 4px solid #1a1a2e; }
        .translation-text { font-size: 18px; color: #333; font-weight: 600; }

        .source-info { margin-top: 12px; text-align: center; font-size: 12px; color: #666; }

        .voice-bar { display: flex; align-items: center; gap: 10px; padding: 12px 20px; background: #fff; border-bottom: 1px solid #e0e0e0; }
        .voice-btn { background: #1a1a2e; color: #fff; border: none; border-radius: 20px; padding: 8px 20px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.2s; }
        .voice-btn:hover { background: #2a2a4e; }
        .voice-btn.playing { background: #27ae60; }
        .voice-btn.playing:hover { background: #2ecc71; }
        .speed-select { background: #f0f0f0; border: 1px solid #ccc; border-radius: 12px; padding: 6px 10px; font-size: 13px; cursor: pointer; }
        .speed-label { font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <div class="header">
        <a href="hunter-list.html">← 返回列表</a>
        <h1>🦋 全職獵人</h1>
    </div>

    <div class="voice-bar">
        <button id="voiceBtn" class="voice-btn" onclick="toggleVoice()">
            <svg id="voiceIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            <span id="voiceLabel">播放</span>
        </button>
        <span class="speed-label">速度</span>
        <select id="speedSelect" class="speed-select" onchange="setSpeed(this.value)">
            <option value="0.5">0.5x</option>
            <option value="0.75">0.75x</option>
            <option value="1" selected>1x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
            <option value="2">2x</option>
        </select>
        <span id="voiceStatus" style="font-size:12px;color:#888;margin-left:4px;"></span>
    </div>
    
    <div id="content">
        <div style="text-align:center; padding: 40px;">載入中...</div>
    </div>
    
    <div class="nav-bar" style="position: fixed; bottom: 0; left: 0; right: 0; padding: 16px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #e0e0e0;">
        <button id="prevBtn" class="nav-btn" onclick="changePage(-1)">← 上一句</button>
        <span id="pageNum"></span>
        <button id="nextBtn" class="nav-btn" onclick="changePage(1)">下一句 →</button>
    </div>
    
    <script>
        let sentences = [];
        let currentIndex = 0;
        let utterance = null;
        let isPlaying = false;
        let currentSpeed = 1.0;

        function findJapaneseVoice() {
            if (!window.speechSynthesis) return null;
            const voices = window.speechSynthesis.getVoices();
            // Prefer Japanese voices
            let jp = voices.find(v => v.lang.startsWith('ja'));
            if (jp) return jp;
            // Fallback to any voice that has Japanese chars (some systems bundle Japanese TTS)
            jp = voices.find(v => v.lang === 'ja-JP' || v.lang.startsWith('ja-'));
            if (jp) return jp;
            // Last resort: any voice
            return voices[0] || null;
        }

        function initVoices() {
            if (window.speechSynthesis) {
                // Chrome needs this before getVoices()
                window.speechSynthesis.getVoices();
                window.speechSynthesis.onvoiceschanged = () => {
                    const v = findJapaneseVoice();
                    if (v) {
                        document.getElementById('voiceStatus').textContent = '聲音: ' + v.name;
                    } else {
                        document.getElementById('voiceStatus').textContent = '無日語聲音';
                    }
                };
                // Safari fires immediately
                const v = findJapaneseVoice();
                if (v) {
                    document.getElementById('voiceStatus').textContent = '聲音: ' + v.name;
                }
            }
        }

        function setSpeed(val) {
            currentSpeed = parseFloat(val);
            if (isPlaying && utterance) {
                utterance.rate = currentSpeed;
            }
        }

        function toggleVoice() {
            if (!window.speechSynthesis) {
                alert('你的瀏覽器不支援語音功能');
                return;
            }

            if (isPlaying) {
                window.speechSynthesis.cancel();
                isPlaying = false;
                updateVoiceBtn();
                return;
            }

            const s = sentences[currentIndex];
            if (!s) return;

            const text = s.japanese || '';
            if (!text) return;

            utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ja-JP';
            utterance.rate = currentSpeed;
            utterance.pitch = 1.0;

            const voice = findJapaneseVoice();
            if (voice) utterance.voice = voice;

            utterance.onstart = () => {
                isPlaying = true;
                updateVoiceBtn();
            };
            utterance.onend = () => {
                isPlaying = false;
                updateVoiceBtn();
            };
            utterance.onerror = () => {
                isPlaying = false;
                updateVoiceBtn();
            };

            window.speechSynthesis.speak(utterance);
        }

        function updateVoiceBtn() {
            const btn = document.getElementById('voiceBtn');
            const label = document.getElementById('voiceLabel');
            const icon = document.getElementById('voiceIcon');
            if (isPlaying) {
                btn.classList.add('playing');
                label.textContent = '停止';
                icon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
            } else {
                btn.classList.remove('playing');
                label.textContent = '播放';
                icon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>';
            }
        }

        fetch('./hunter-data.json')
            .then(r => r.json())
            .then(data => {
                sentences = data.sentences || [];
                initFromURL();
                initVoices();
            });

        function initFromURL() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (id) {
                currentIndex = parseInt(id);
            }
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= sentences.length) currentIndex = sentences.length - 1;
            render();
        }

        function changePage(delta) {
            currentIndex += delta;
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= sentences.length) currentIndex = sentences.length - 1;
            render();
            window.scrollTo(0, 0);
        }
        
        function render() {
            const s = sentences[currentIndex];
            if (!s) return;
            
            document.getElementById('pageNum').textContent = `${currentIndex + 1} / ${sentences.length}`;
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === sentences.length - 1;
            
            // Build vertical display from sequence array
            let vertHtml = '<div class="vert-container">';
            (s.sequence || []).forEach(item => {
                const kanji = item[0] || '';
                const hira = item[1] || '';
                const ro = item[2] || '';
                
                const hiraChars = hira.split('');
                const roParts = ro.split(' ');
                
                vertHtml += `<div class="vert-col">`;
                
                if (kanji && kanji !== '。' && kanji !== '、' && kanji !== '？' && kanji !== '！') {
                    vertHtml += `<div class="vert-kanji">${kanji}</div>`;
                } else if (kanji === '。') {
                    vertHtml += `<div class="vert-kanji" style="color:#999;">。</div>`;
                } else if (kanji === '、') {
                    vertHtml += `<div class="vert-kanji" style="color:#999;">、</div>`;
                } else if (kanji === '！') {
                    vertHtml += `<div class="vert-kanji" style="color:#999;">！</div>`;
                } else if (kanji === '？') {
                    vertHtml += `<div class="vert-kanji" style="color:#999;">？</div>`;
                } else {
                    vertHtml += `<div class="vert-kanji">　</div>`;
                }
                
                if (hiraChars.length > 0 && hiraChars[0]) {
                    hiraChars.forEach(h => {
                        vertHtml += `<div class="vert-hira">${h}</div>`;
                    });
                }
                
                if (roParts.length > 0 && roParts[0]) {
                    roParts.forEach(r => {
                        vertHtml += `<div class="vert-ro">${r}</div>`;
                    });
                }
                
                vertHtml += `</div>`;
            });
            vertHtml += '</div>';
            
            // Build explanation table
            let tableHtml = '<table class="grammar-table"><tr><th>單字</th><th>意思</th><th>詞性</th><th>說明</th></tr>';
            (s.explanation || []).forEach(exp => {
                let word = exp.word || '-';
                if (!exp.word && exp.mean) {
                    const m = exp.mean.match(/【([^】]+)】/);
                    if (m) word = m[1];
                }
                tableHtml += `<tr>
                    <td class="word-col">${word}</td>
                    <td class="mean-col">${exp.mean || '-'}</td>
                    <td class="pos-col">${exp.pos || '-'}</td>
                    <td class="note-col">${exp.note || '-'}</td>
                </tr>`;
            });
            tableHtml += '</table>';
            
            let translation = s.translation || '';
            if (!translation && s.explanation && s.explanation.length > 0) {
                const fullSent = s.explanation.find(e => e.pos === '句子' || e.pos === '文章' || e.pos === '短語');
                translation = fullSent ? fullSent.mean : '';
            }
            
            const html = `
            <div class="sentence-card">
                <div class="sentence-header">
                    <span class="sentence-id">SENTENCE #${s.id}</span>
                    <span class="sentence-character">${s.character || ''}</span>
                </div>
                
                <div class="japanese-main">${s.japanese || ''}</div>
                
                <div class="japanese-section">
                    ${vertHtml}
                </div>
                
                ${tableHtml}
                
                <div class="translation">
                    <div class="translation-text">${translation}</div>
                </div>

                <div class="source-info">${s.character || ''} · ${s.source || 'HUNTER × HUNTER'}</div>
            </div>
            `;
            
            document.getElementById('content').innerHTML = html;
        }
    </script>
</body>
</html>
